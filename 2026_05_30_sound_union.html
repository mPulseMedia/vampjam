<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>vamp jam — Sound Union — 2026-05-30</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sacramento&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #4a2a0e;
    --panel: #5c3717;
    --panel_2: #6b4423;
    --panel_3: #7a4f2a;
    --fg: #f5e5c5;
    --muted: #c9a87e;
    --accent: #e8b454;
    --accent_2: #d4a95a;
    --danger: #c75450;
    --warn: #e8c794;
  }
  * { box-sizing: border-box; }
  html, body { background: var(--bg); color: var(--fg); margin: 0; padding: 0; }
  body { font: 15px/1.45 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; padding: 14px; padding-bottom: 160px; max-width: 760px; margin: 0 auto; }
  .brand { text-align: center; margin: 8px 0 6px; }
  .brand .wordmark {
    font-family: 'Sacramento', cursive;
    font-size: 68px; line-height: 1; color: var(--fg);
    display: inline-block; margin: 0;
  }
  .brand .tagline {
    color: var(--fg); opacity: 0.85; font-size: 13px;
    letter-spacing: 0.04em; margin-top: -2px;
  }
  h1 { font-size: 18px; margin: 14px 0 4px; font-weight: 600; }
  .subtitle { color: var(--muted); font-size: 13px; margin-bottom: 12px; }
  code.inline { background: var(--panel_2); padding: 1px 5px; border-radius: 4px; }

  /* ---- audio source card ---- */
  .audio_card { background: transparent; padding: 6px 0; margin-bottom: 8px; }
  .audio_label_row {
    display: flex; align-items: center; gap: 8px;
  }
  .audio_label_row .audio_icon { font-size: 18px; }
  .audio_label_row .audio_label {
    flex: 1; color: var(--fg); font-weight: 600; font-size: 15px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .audio_label_row .audio_label.empty { color: var(--muted); font-weight: 500; font-style: italic; }
  .audio_label_row .audio_kind { color: var(--muted); font-size: 11px; }
  .audio_edit_form {
    margin-top: 10px; padding: 10px 12px;
    background: var(--panel_2); border-radius: 8px;
  }
  .audio_edit_form input[type=text] {
    width: 100%; background: var(--panel_3); border: 1px solid var(--panel_3); color: var(--fg);
    padding: 8px 10px; border-radius: 6px; font: inherit; margin-bottom: 6px;
  }
  .audio_edit_form input[type=text]:focus { border-color: var(--accent_2); outline: none; }
  .audio_edit_actions { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 4px; }
  .audio_edit_actions button { font-size: 13px; padding: 7px 12px; min-height: 34px; }
  .audio_edit_help { color: var(--muted); font-size: 11px; margin-top: 8px; }
  .audio_edit_help a { color: var(--accent_2); }

  /* ---- pat (github access) ---- */
  .pat_setup { background: var(--panel_2); border-radius: 8px; padding: 8px 12px; margin-top: 10px; font-size: 12px; color: var(--muted); }
  .pat_setup summary { color: var(--fg); font-weight: 600; font-size: 12px; cursor: pointer; }
  .pat_setup .pat_body { margin-top: 8px; }
  .pat_setup a { color: var(--accent_2); }
  .pat_setup p { margin: 0 0 8px; }
  .pat_setup code { background: var(--panel_3); padding: 1px 4px; border-radius: 3px; color: var(--fg); }
  .pat_row { display: flex; gap: 6px; flex-wrap: wrap; }
  .pat_row input { flex: 2; min-width: 180px; background: var(--panel_3); border: 1px solid var(--panel_3); color: var(--fg); padding: 6px 8px; border-radius: 6px; font: inherit; font-size: 12px; }
  .pat_row input:focus { border-color: var(--accent_2); outline: none; }
  .pat_row button { font-size: 12px; padding: 6px 10px; min-height: 32px; }
  .pat_ok { color: var(--accent); }
  .pat_err { color: var(--danger); }

  /* ---- player ---- */
  .player_card { background: transparent; padding: 4px 0 10px; margin-bottom: 4px; text-align: center; }
  audio { display: none; }
  .ctrl_row { display: flex; justify-content: center; align-items: center; gap: 8px; margin-bottom: 14px; }
  .seek_bar { width: 100%; height: 6px; background: var(--panel_3); border-radius: 3px; position: relative; cursor: pointer; }
  .seek_fill { position: absolute; left: 0; top: 0; bottom: 0; background: var(--accent); border-radius: 3px; pointer-events: none; }
  .tag_markers { position: relative; height: 14px; margin-top: 4px; margin-bottom: 4px; }
  .tag_marker {
    position: absolute; top: 2px; width: 10px; height: 10px;
    background: var(--accent); border-radius: 50%;
    transform: translateX(-50%); cursor: pointer;
    border: 1.5px solid var(--bg);
    transition: transform 0.1s;
  }
  .tag_marker:hover { transform: translateX(-50%) scale(1.4); }
  .tag_marker.active { background: var(--accent_2); box-shadow: 0 0 0 2px var(--accent_2); }
  .time_row { display: flex; justify-content: center; gap: 8px; color: var(--muted); font-size: 13px; font-variant-numeric: tabular-nums; margin-bottom: 8px; }
  .time_row #now_time { color: var(--fg); font-weight: 600; }
  .ctrl_btn {
    appearance: none; -webkit-appearance: none; border: 0;
    background: var(--panel_2); color: var(--fg); font: inherit; font-weight: 600;
    border-radius: 50%; width: 52px; height: 52px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; line-height: 1; padding: 0;
    transition: background-color 0.12s, transform 0.06s;
  }
  .ctrl_btn:hover  { background: var(--panel_3); }
  .ctrl_btn:active { background: var(--accent_2); color: #0b0d0f; transform: scale(0.95); }
  .ctrl_btn.play_btn {
    width: 84px; height: 84px; background: var(--accent); color: #0b0d0f;
    font-size: 44px; box-shadow: 0 4px 14px rgba(106,191,105,0.25);
  }
  .ctrl_btn.play_btn:hover  { background: #f0c97a; }
  .ctrl_btn.play_btn:active { background: #c89943; transform: scale(0.95); }
  .ctrl_btn.small { width: 40px; height: 40px; font-size: 11px; }
  .ctrl_btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .player_msg { color: var(--muted); font-size: 12px; margin-top: 12px; min-height: 16px; }
  .player_msg.err { color: var(--danger); }

  /* ---- buttons ---- */
  button {
    appearance: none; -webkit-appearance: none; border: 0; cursor: pointer;
    background: var(--panel_2); color: var(--fg); font: inherit;
    padding: 8px 12px; border-radius: 8px; min-height: 36px;
    transition: background-color 0.12s, transform 0.06s;
  }
  button:hover  { background: var(--panel_3); }
  button:active { background: var(--accent_2); color: #0b0d0f; transform: scale(0.97); }
  button.primary           { background: var(--accent);   color: #0b0d0f; font-weight: 600; }
  button.primary:hover     { background: #f0c97a; }
  button.primary:active    { background: #c89943; }
  button.primary_2         { background: var(--accent_2); color: #0b0d0f; font-weight: 600; }
  button.primary_2:hover   { background: #e0bb6e; }
  button.primary_2:active  { background: #b88e3d; }
  button.ghost {
    background: var(--panel_2); color: var(--muted);
    padding: 6px 8px; min-height: 32px;
  }
  button.ghost:hover  { background: var(--panel_3); color: var(--fg); }
  button.ghost:active { background: var(--accent_2); color: #0b0d0f; }
  button.tiny {
    padding: 4px 6px; min-height: 26px; font-size: 11px;
    background: var(--panel_3);
  }
  button.tiny:hover  { background: var(--accent_2); color: #0b0d0f; }
  button.tiny:active { background: var(--accent);   color: #0b0d0f; }

  .tag_btn_big {
    width: 100%; padding: 16px; font-size: 17px; font-weight: 600;
    background: var(--accent); color: #0b0d0f; border-radius: 12px;
    margin: 8px 0 14px; box-shadow: 0 4px 14px rgba(106,191,105,0.18);
  }

  /* ---- tags ---- */
  .tag_header { display: flex; justify-content: space-between; align-items: center; padding: 0 4px 6px; }
  .tag_header h2 { font-size: 13px; margin: 0; color: var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; }
  .sort_toggle { display: inline-flex; background: var(--panel_2); border-radius: 8px; padding: 2px; }
  .sort_toggle button {
    background: transparent; color: var(--muted); border: 0; cursor: pointer;
    padding: 4px 10px; border-radius: 6px; font: inherit; font-size: 12px;
    min-height: 28px; font-weight: 600;
  }
  .sort_toggle button.active { background: var(--accent_2); color: #0b0d0f; }
  .tag_list { background: transparent; padding: 0; touch-action: pan-y; }
  .tag_row {
    display: flex; align-items: center; gap: 4px;
    padding: 4px 4px; border-radius: 8px; background: transparent;
    flex-wrap: nowrap;
  }
  .tag_row .tag_label {
    flex: 1 1 60px; min-width: 0;
  }
  .tag_row .tag_end {
    font-variant-numeric: tabular-nums; color: var(--warn);
    cursor: pointer; padding: 4px 6px; border-radius: 6px;
    min-width: 64px; text-align: right; font-weight: 600; font-size: 13px;
    flex: 0 0 auto;
  }
  .tag_row .tag_end:hover { background: rgba(232,199,148,0.15); }
  .tag_row button.play_tag {
    background: var(--panel_3); color: var(--fg);
    padding: 4px 8px; min-height: 30px; font-size: 15px;
    border-radius: 6px; flex: 0 0 auto;
  }
  .tag_row button.play_tag:hover { background: var(--accent); color: #0b0d0f; }
  .tag_row button.add_end {
    background: var(--panel_3); color: var(--warn);
    font-size: 10px; padding: 3px 6px; min-height: 22px; border-radius: 6px;
    flex: 0 0 auto;
  }
  .tag_row button.add_end:hover { background: var(--warn); color: #0b0d0f; }
  .tag_row button.play_tag.autoplay_blocked {
    background: var(--warn); color: #0b0d0f; font-weight: 700;
    animation: pulse_warn 1.2s ease-in-out infinite;
  }
  @keyframes pulse_warn {
    0%, 100% { box-shadow: 0 0 0 0 rgba(232,199,148,0.6); }
    50%      { box-shadow: 0 0 0 6px rgba(232,199,148,0); }
  }
  .tag_row:hover { background: var(--panel_2); }
  .tag_row.active { background: var(--panel_2); outline: 1px solid var(--accent); }
  .tag_row.dragging { opacity: 0.4; }
  .tag_row.mine {
    background: rgba(91,155,213,0.14);
    border-left: 3px solid #5b9bd5;
  }
  .tag_row.mine .tag_label { font-weight: 600; color: #b3d3f0; }
  .tag_row.mine .tag_time  { color: #5b9bd5; }
  .tag_row:not(.mine):not(.playing) .tag_label { opacity: 0.70; }
  .tag_row:not(.mine) .tag_time { color: var(--warn); }
  .drag_handle {
    cursor: grab; color: var(--muted); padding: 4px 6px; user-select: none;
    font-size: 16px; line-height: 1; touch-action: none;
  }
  .drag_handle:active { cursor: grabbing; }
  .tag_row.no_drag .drag_handle { color: var(--panel_3); cursor: default; }
  .drop_indicator { height: 2px; background: var(--accent); margin: 2px 8px; border-radius: 1px; pointer-events: none; }
  .playhead_line {
    height: 3px; margin: 2px 12px; border-radius: 2px;
    background: #4dd0e1;
    box-shadow: 0 0 8px rgba(77,208,225,0.7);
    pointer-events: none;
  }
  .tag_time {
    font-variant-numeric: tabular-nums; color: var(--accent_2);
    cursor: pointer; padding: 4px 6px; border-radius: 6px; min-width: 68px; text-align: right;
    font-weight: 600; font-size: 13px;
  }
  .tag_time:hover { background: rgba(91,155,213,0.12); }
  .tag_label {
    background: transparent; border: 0; color: var(--fg); font: inherit;
    width: 100%; padding: 4px 6px; border-radius: 6px;
  }
  .tag_label:focus { outline: 1px solid var(--accent_2); background: rgba(0,0,0,0.2); }
  .tag_actions { display: flex; gap: 2px; }
  .empty { color: var(--muted); padding: 14px; text-align: center; font-size: 13px; }

  /* ---- misc ---- */
  .footer {
    position: fixed; bottom: 0; left: 0; right: 0; padding: 10px 14px;
    background: var(--panel); border-top: 1px solid var(--panel_3);
    display: flex; gap: 8px; justify-content: center; flex-wrap: wrap;
    padding-bottom: calc(10px + env(safe-area-inset-bottom));
  }
  .toast {
    position: fixed; left: 50%; transform: translateX(-50%);
    bottom: 100px; background: #0b0d0f; color: var(--fg);
    padding: 8px 14px; border-radius: 20px; font-size: 13px;
    opacity: 0; transition: opacity 0.2s; pointer-events: none;
    border: 1px solid var(--panel_3); z-index: 99;
    max-width: 90%;
  }
  .toast.show { opacity: 1; }
  details.about_page { background: var(--panel); border-radius: 12px; padding: 10px 14px; margin-top: 14px; color: var(--muted); font-size: 13px; }
  details.about_page summary { cursor: pointer; color: var(--fg); font-weight: 600; }
  details.about_page code { background: var(--panel_2); padding: 1px 6px; border-radius: 4px; color: var(--fg); }

  @media (max-width: 480px) {
    .ctrl_btn { width: 48px; height: 48px; }
    .ctrl_btn.small { width: 34px; height: 34px; font-size: 10px; }
    .ctrl_btn.play_btn { width: 76px; height: 76px; font-size: 38px; }
  }
</style>
</head>

<header class="brand">
  <div class="wordmark">vamp jam</div>
</header>

<h1>Sound Union — 2026-05-30</h1>

<!-- ===== player ===== -->
<div class="player_card">
  <audio id="player" preload="metadata"></audio>
  <div class="ctrl_row">
    <button class="ctrl_btn" id="back_120" title="Back 2 min">−2m</button>
    <button class="ctrl_btn" id="back_15"  title="Back 15 sec">−15s</button>

  <div class="seek_bar" id="seek_bar"><div class="seek_fill" id="seek_fill"></div></div>
  <div class="tag_markers" id="tag_markers"></div>
  <div class="time_row">
    <span id="now_time">0:00</span>
    <span>/</span>
    <span id="dur_time">--:--</span>

</div>

<button class="tag_btn_big" id="tag_btn">+ Tag this moment</button>

<div class="tag_header">
  <h2>Tags</h2>
  <div class="sort_toggle" id="sort_toggle">
    <button data-mode="time">Time</button>
    <button data-mode="manual">Manual</button>
  </div>
</div>

<div class="tag_list" id="tag_list"></div>

<!-- ===== audio source (single file) — bottom of page ===== -->
<div class="audio_card" id="audio_card">
  <div class="audio_label_row">
    <span class="audio_icon">🎵</span>
    <span class="audio_label empty" id="audio_label">Loading…</span>
    <button class="ghost" id="audio_edit_btn" title="Change audio file">✎</button>
  </div>

  <div class="audio_edit_form" id="audio_edit_form" style="display:none">
    <input type="text" id="audio_url_in" placeholder="Paste audio URL (Google Drive share, direct URL, or filename next to this page)">
    <input type="text" id="audio_label_in" placeholder="Label (optional — auto-derived if blank)">
    <div class="audio_edit_actions">
      <button class="primary" id="audio_save_btn">Save to page</button>
      <button id="audio_cancel_btn">Cancel</button>
      <button id="audio_pick_local" class="ghost">Pick local file (preview only)</button>
      <input type="file" id="audio_local_in" accept="audio/*" style="display:none">
    </div>
    <div class="audio_edit_help">
      Drive: share as <i>Anyone with the link → Viewer</i>, then paste the share URL.
      Saving writes <code id="audio_path_display"></code> to the repo so every visitor sees this audio.
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<div class="footer">
  <button id="export_btn">Export tags</button>
  <button id="import_btn">Import tags</button>
  <button id="clear_btn" style="color:var(--danger)">Clear tags</button>
  <input type="file" id="import_file" accept="application/json" style="display:none">
</div>

  // ============ per-page identity ============
  // Each new page only needs to change PAGE_ID. The audio source lives in sources/<PAGE_ID>.json.
  var PAGE_ID    = 'sound_union_2026_05_30';
  var REPO_OWNER = 'mPulseMedia';
  var REPO_NAME  = 'vampjam';
  var WORKER_URL = 'https://vampjam-sync.crimson-dust-a18d.workers.dev/';

  // Single per-page JSON colocated with this HTML (e.g. 2026_05_23_bazaar_cafe.json).
  var DATA_PATH = (function () {
    var pn = location.pathname || '';
    var base = pn.substring(pn.lastIndexOf('/') + 1).replace(/\.html?$/i, '');

  var patClear      = $('pat_clear');
  var patStatus     = $('pat_status');
  var identityIn    = $('identity_in');
  var identitySave  = $('identity_save');

  var player    = $('player');
  var playerMsg = $('player_msg');
  var nowTime   = $('now_time');

  // ============ state ============
  var audio        = null;   // { label, url, kind } | null
  var audioSha     = null;   // sha of sources/<PAGE_ID>.json from last GitHub GET (for PUTs)
  var tags         = load_json(STORAGE_TAGS, []);
  var sortMode     = localStorage.getItem(STORAGE_SORT) || 'time';
  var activeTagId  = null;
  var playingTagId = null;     // tag currently containing currentTime (auto-tracked)
  var autoplayBlocked = false; // true if a play() promise rejected (browser blocked autoplay)
  var dragState    = null;
  var playbackIntent = null;   // { type:'preview_end', endTime, nextTagId }

  audioPathDisp.textContent = DATA_PATH;

  // ============ utils ============
  function load_json(key, fallback) {
    try {
      var raw = localStorage.getItem(key);
      if (!raw) return fallback;
      var v = JSON.parse(raw);
      return v == null ? fallback : v;
    } catch (e) { return fallback; }
  }
  function save_tags() { try { localStorage.setItem(STORAGE_TAGS, JSON.stringify(tags)); } catch (e) {} }
  function save_sort() { try { localStorage.setItem(STORAGE_SORT, sortMode); } catch (e) {} }
  function get_tombs() { return load_json(STORAGE_TOMBS, []); }
  function add_tombstone(id) {
    var t = get_tombs();
    if (t.indexOf(id) === -1) t.push(id);
    try { localStorage.setItem(STORAGE_TOMBS, JSON.stringify(t)); } catch (e) {}
  }

  function fmt_time(sec) {
    sec = Math.max(0, Math.floor(sec || 0));
    var h = Math.floor(sec / 3600);
    var m = Math.floor((sec % 3600) / 60);
    var s = sec % 60;
    if (h > 0) return h + ':' + String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');
    return m + ':' + String(s).padStart(2,'0');
  }
  function fmt_url(sec) {
    sec = Math.max(0, Math.floor(sec || 0));
    var h = Math.floor(sec / 3600);
    var m = Math.floor((sec % 3600) / 60);
    var s = sec % 60;
    var out = '';
    if (h > 0) out += h + 'h';
    if (m > 0 || h > 0) out += m + 'm';
    out += s + 's';
    return out;
  }
  function parse_time(t) {
    if (t === null || t === undefined) return null;
    t = String(t).trim().toLowerCase();
    if (!t) return null;
    if (/^\d+(\.\d+)?$/.test(t)) return parseFloat(t);
    if (/^\d+:\d+(:\d+)?$/.test(t)) {
      var parts = t.split(':').map(Number);
      if (parts.length === 2) return parts[0]*60 + parts[1];
      if (parts.length === 3) return parts[0]*3600 + parts[1]*60 + parts[2];
    }
    var m = t.match(/^(?:(\d+)h)?(?:(\d+)m)?(?:(\d+)s)?$/);
    if (m && (m[1] || m[2] || m[3])) {
      return (parseInt(m[1]||0)*3600) + (parseInt(m[2]||0)*60) + parseInt(m[3]||0);
    }
    return null;
  }
  function get_url_time() {
    try {
      var qp = new URLSearchParams(window.location.search);
      if (qp.has('t')) {
        var v = parse_time(qp.get('t'));
        if (v !== null) return v;
      }
    } catch (e) {}
    var h = window.location.hash || '';
    if (h.startsWith('#')) h = h.slice(1);
    try {
      var hp = new URLSearchParams(h);
      if (hp.has('t')) {
        var v2 = parse_time(hp.get('t'));
        if (v2 !== null) return v2;
      }
    } catch (e) {}
    var direct = parse_time(h);
    if (direct !== null) return direct;
    return null;
  }
  function build_share_url(sec) {
    var base = window.location.origin + window.location.pathname;
    return base + '?t=' + fmt_url(sec);
  }

  // ============ drive url handling ============
  function drive_id(u) {
    if (!u) return null;
    try {
      var m;
      m = u.match(/\/file\/d\/([a-zA-Z0-9_-]+)/);            if (m) return m[1];
      m = u.match(/[?&]id=([a-zA-Z0-9_-]+)/);                  if (m) return m[1];
      m = u.match(/\/document\/d\/([a-zA-Z0-9_-]+)/);          if (m) return m[1];
      m = u.match(/^([a-zA-Z0-9_-]{20,})$/);                   if (m) return m[1];
    } catch (e) {}
    return null;
  }
  function detect_kind(url) {
    if (!url) return 'url';
    if (/drive\.google\.com/.test(url) && drive_id(url)) return 'drive';
    if (/^https?:\/\//i.test(url)) return 'url';
    return 'local';
  }
  function resolve_url(src) {
    if (!src) return '';
    if (src.kind === 'drive') {
      var id = drive_id(src.url);
      if (id) return 'https://drive.usercontent.google.com/download?id=' + id + '&export=download&authuser=0';
    }
    return src.url;
  }
  function derive_label(url) {
    if (!url) return 'Audio';
    if (/drive\.google\.com/.test(url)) return 'Google Drive audio';
    try {
      var u = new URL(url);
      var last = (u.pathname.split('/').pop() || '').replace(/\.[^.]+$/, '');
      if (last) return decodeURIComponent(last);
    } catch (e) {}
    var bare = url.split('/').pop() || url;
    return bare.replace(/\.[^.]+$/, '');
  }

  // ============ pat (github access) ============
  function get_pat()  { return localStorage.getItem(STORAGE_PAT) || ''; }
  function set_pat(p) { if (p) localStorage.setItem(STORAGE_PAT, p); else localStorage.removeItem(STORAGE_PAT); render_pat_status(); }
  function has_pat()  { return !!get_pat(); }
  function get_device_id() {
    var id = localStorage.getItem(STORAGE_DEVICE);
    if (!id) {
      id = 'dev_' + Math.random().toString(36).slice(2, 10);
      try { localStorage.setItem(STORAGE_DEVICE, id); } catch (e) {}
    }
    return id;
  }
  function get_identity() { return localStorage.getItem(STORAGE_IDENTITY) || ''; }
  function set_identity(v) {
    if (v) localStorage.setItem(STORAGE_IDENTITY, v);
    else localStorage.removeItem(STORAGE_IDENTITY);
  }
  function render_pat_status() {
    if (!patStatus || !patIn) return;
    if (has_pat()) {
      patStatus.innerHTML = '<span class="pat_ok">✓ Token saved.</span>';
      patIn.value = '';
      patIn.placeholder = '••••• (token saved)';
    } else {
      patStatus.innerHTML = '<span class="pat_err">No token yet — needed to save.</span>';
      patIn.placeholder = 'github_pat_… or ghp_…';
    }
  }

  // ============ github contents api ============
  function gh_url() {
    return 'https://api.github.com/repos/' + REPO_OWNER + '/' + REPO_NAME + '/contents/' + SOURCES_PATH;
  }
  function gh_headers() {
    return {
      'Authorization': 'Bearer ' + get_pat(),
      'Accept': 'application/vnd.github+json',
      'X-GitHub-Api-Version': '2022-11-28'
    };
  }
  function b64_utf8(s) { return btoa(unescape(encodeURIComponent(s))); }
  function utf8_b64(s) { try { return decodeURIComponent(escape(atob((s||'').replace(/\s+/g, '')))); } catch (e) { return ''; } }

  function gh_get_audio() {
    return fetch(gh_url(), { headers: gh_headers(), cache: 'no-store' }).then(function (r) {
      if (r.status === 404) return { _missing: true };
      if (!r.ok) return r.json().then(function (j) { throw new Error(j.message || 'GitHub GET ' + r.status); });
      return r.json();
    });
  }
  function gh_put_audio(jsonText, sha, message) {
    var body = { message: message, content: b64_utf8(jsonText) };
    if (sha) body.sha = sha;
    return fetch(gh_url(), {
      method: 'PUT',
      headers: Object.assign({ 'Content-Type': 'application/json' }, gh_headers()),
      body: JSON.stringify(body)
    }).then(function (r) {
      if (!r.ok) return r.json().then(function (j) { throw new Error(j.message || 'GitHub PUT ' + r.status); });
      return r.json();
    });
  }

  // ============ audio source: read / write / play ============
  // tags are now seeded by fetch_repo_data (combined file). keep a stub for back-compat.
  function fetch_repo_tags() { return Promise.resolve(); }

  // debounced auto-sync: collapses rapid edits into one commit
  var saveDebounceTimer = null;
  var saveDebounceMsg   = null;
  function queue_save_data_to_repo(msg) {
    if (!WORKER_URL) return;
    if (msg) saveDebounceMsg = msg;
    if (saveDebounceTimer) clearTimeout(saveDebounceTimer);
    saveDebounceTimer = setTimeout(function () {
      saveDebounceTimer = null;
      var m = saveDebounceMsg || 'sync tags';
      saveDebounceMsg = null;
      toast('Syncing…');
      save_data_to_repo(m).then(function () {
        toast('Synced.');
      }).catch(function (err) {
        toast('Sync failed: ' + err.message);
      });
    }, 3000);
  }

  // POST the combined per-page data ({audio, tags}) to the Cloudflare Worker proxy.
  // The Worker holds the PAT as a secret and commits to the repo.
  function save_data_to_repo(message) {
    if (!WORKER_URL) return Promise.reject(new Error('worker not configured'));
    var payload = {
      audio: audio || null,
      tags: tags.slice().sort(function (a, b) { return a.t - b.t; }).map(function (t) {
        var o = { id: t.id, t: t.t, label: t.label || '' };
        if (t.e != null) o.e = t.e;
        return o;
      })
    };
    var content = JSON.stringify(payload, null, 2) + '\n';
    return fetch(WORKER_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ path: DATA_PATH, content: content, message: message })
    }).then(function (r) {
      if (!r.ok) return r.text().then(function (t) { throw new Error('Worker ' + r.status + ': ' + t); });
      return r.json();
    });
  }

  function render_playhead_line() {
    // remove any existing
    var existing = tagList.querySelector('.playhead_line');
    if (existing) existing.remove();
    if (sortMode !== 'time') return;          // only meaningful in time-sorted view
    if (!isFinite(player.duration)) return;
    if (!tags.length) return;
    var ct = player.currentTime || 0;
    var sorted = tags.slice().sort(function (a, b) { return a.t - b.t; });
    var nextIdx = sorted.findIndex(function (t) { return t.t > ct; });
    var line = document.createElement('div');
    line.className = 'playhead_line';
    var rows = Array.from(tagList.querySelectorAll('.tag_row'));
    if (nextIdx === -1) {
      // playhead is past the last tag — append at end
      tagList.appendChild(line);
    } else if (nextIdx === 0) {
      // playhead is before the first tag — insert at top
      if (rows[0]) tagList.insertBefore(line, rows[0]);
    } else {
      var targetId = sorted[nextIdx].id;
      var target = tagList.querySelector('.tag_row[data-tag-id="' + targetId + '"]');
      if (target) tagList.insertBefore(line, target);
    }
  }

  function render_tag_markers() {
    if (!tagMarkers) return;
    tagMarkers.innerHTML = '';
    if (!isFinite(player.duration) || player.duration <= 0) return;
    tags.forEach(function (t) {
      var m = document.createElement('div');
      m.className = 'tag_marker' + (t.id === activeTagId ? ' active' : '');
      m.style.left = (t.t / player.duration * 100) + '%';
      m.title = (t.label || 'tag') + ' @ ' + fmt_time(t.t);
      m.addEventListener('click', function (e) {
        e.stopPropagation();
        seek_to(t.t);
        safe_play();
        activeTagId = t.id;
        render_tags();
        render_tag_markers();
      });
      tagMarkers.appendChild(m);
    });
  }

  function fetch_repo_data() {
    // ALWAYS fetch from github raw — Pages CDN can lag 1-2 min behind the latest push.
    var srcUrl = 'https://raw.githubusercontent.com/' + REPO_OWNER + '/' + REPO_NAME +
                 '/main/' + DATA_PATH + '?v=' + Date.now();
    return fetch(srcUrl, { cache: 'no-store' }).then(function (r) {
      if (!r.ok) return null;
      return r.json().catch(function () { return null; });
    }).then(function (data) {
      if (!data) { audio = null; render_audio_label(); return; }
      var a = data.audio;
      if (a && typeof a === 'object' && a.url) {
        audio = { label: a.label || derive_label(a.url), url: a.url, kind: a.kind || detect_kind(a.url) };
      } else if (data.url && !data.tags) {
        audio = { label: data.label || derive_label(data.url), url: data.url, kind: data.kind || detect_kind(data.url) };
      } else {
        audio = null;
      }
      render_audio_label();
      load_audio_into_player();

      var arr = Array.isArray(data.tags) ? data.tags : null;
      if (arr) {
        // REPLACE local tags with repo's view (minus tombstones). Worker auto-sync keeps
        // local edits flowing to the repo so this is the right source of truth.
        var tombs = get_tombs();
        tags = arr
          .filter(function (t) { return t && t.id && typeof t.t === 'number' && tombs.indexOf(t.id) === -1; })
          .map(function (t, i) {
            var cp = { id: t.id, t: t.t, label: t.label || '', order: i * 10 };
            if (t.e != null) cp.e = t.e;
            if (t.owner)   cp.owner = t.owner;
            return cp;
          });
        save_tags();
        render_tags();
        render_tag_markers();
      }
    }).catch(function () { audio = null; render_audio_label(); });
  }
  // back-compat alias used elsewhere
  function fetch_audio_public() { return fetch_repo_data(); }
  function render_audio_label() {
    if (audio) {
      audioLabelEl.textContent = audio.label;
      audioLabelEl.classList.remove('empty');
      audioLabelEl.title = audio.url;
    } else {
      audioLabelEl.textContent = 'No audio file bound yet — click ✎ to add one';
      audioLabelEl.classList.add('empty');
      audioLabelEl.title = '';
    }
  }
  function load_audio_into_player() {
    if (!audio) {
      player.removeAttribute('src');
      playerMsg.textContent = '';
      return;
    }
    var url = resolve_url(audio);
    if (player.src !== url) player.src = url;
    playerMsg.textContent = '';
  }

  function open_edit_form(prefill) {
    audioEditForm.style.display = 'block';
    audioUrlIn.value   = (prefill && prefill.url)   || (audio ? audio.url   : '');
    audioLabelIn.value = (prefill && prefill.label) || (audio ? audio.label : '');
    setTimeout(function () { audioUrlIn.focus(); }, 0);
  }
  function close_edit_form() {
    audioEditForm.style.display = 'none';
    audioUrlIn.value = '';
    audioLabelIn.value = '';
  }
  audioEditBtn.addEventListener('click', function () {
    if (audioEditForm.style.display === 'block') { close_edit_form(); return; }
    open_edit_form();
  });
  audioCancelBtn.addEventListener('click', close_edit_form);

  function save_audio() {
    var url = (audioUrlIn.value || '').trim();
    var label = (audioLabelIn.value || '').trim();
    if (!url) { toast('Paste an audio URL first'); audioUrlIn.focus(); return; }
    var kind = detect_kind(url);
    if (!label) label = derive_label(url);

    toast('Saving to repo…');
    audio = { label: label, url: url, kind: kind };
    save_data_to_repo('set audio for ' + PAGE_ID).then(function () {
      render_audio_label();
      load_audio_into_player();
      close_edit_form();
      toast('Saved. Pages rebuilds in ~1-2 min for new visitors.');
    }).catch(function (err) {
      toast('Save failed: ' + err.message);
    });
  }
  audioSaveBtn.addEventListener('click', save_audio);

  audioPickLocal.addEventListener('click', function () { audioLocalIn.click(); });
  audioLocalIn.addEventListener('change', function () {
    var f = audioLocalIn.files && audioLocalIn.files[0];
    if (!f) return;
    var blobUrl = URL.createObjectURL(f);
    player.src = blobUrl;
    audioLabelEl.textContent = f.name + ' (local preview — not saved)';
    audioLabelEl.classList.remove('empty');
    audioLocalIn.value = '';
    close_edit_form();
  });

  // pat / identity handlers — removed; sync now goes through the Cloudflare Worker proxy.
  if (patSave)  patSave.addEventListener('click', function () {});
  if (patClear) patClear.addEventListener('click', function () {});

  // ============ player controls ============
  function safe_play()  { try { player.play().catch(function(){}); } catch (e) {} }
  function safe_pause() { try { player.pause(); } catch (e) {} }
  function toggle_play(){ if (player.paused) safe_play(); else safe_pause(); }
  function seek_to(sec){
    try {
      var d = isFinite(player.duration) ? player.duration : Infinity;
      player.currentTime = Math.max(0, Math.min(sec, d));
    } catch (e) {}
  }
  function nudge(d) { seek_to((player.currentTime || 0) + d); }

  playBtn.addEventListener('click', toggle_play);
  back5  .addEventListener('click', function () { nudge(-5); });
  fwd5   .addEventListener('click', function () { nudge( 5); });
  back15 .addEventListener('click', function () { nudge(-15); });
  fwd15  .addEventListener('click', function () { nudge( 15); });
  back120.addEventListener('click', function () { nudge(-120); });
  fwd120 .addEventListener('click', function () { nudge( 120); });

  seekBar.addEventListener('click', function (e) {
    var rect = seekBar.getBoundingClientRect();
    var p = (e.clientX - rect.left) / rect.width;
    var d = isFinite(player.duration) ? player.duration : 0;
    seek_to(p * d);
  });

  player.addEventListener('play',  function () {
    playBtn.innerHTML = ICON_PAUSE;
    autoplayBlocked = false;
    render_tags();
  });
  player.addEventListener('pause', function () {
    playBtn.innerHTML = ICON_PLAY;
    render_tags();
  });
  player.addEventListener('ended', function () {
    playBtn.innerHTML = ICON_PLAY;
    render_tags();
  });
  player.addEventListener('timeupdate', function () {
    nowTime.textContent = fmt_time(player.currentTime);
    if (isFinite(player.duration) && player.duration > 0) {
      seekFill.style.width = ((player.currentTime / player.duration) * 100) + '%';
    }
    update_playing_tag();
    render_playhead_line();
    if (playbackIntent && player.currentTime >= playbackIntent.endTime) {
      var intent = playbackIntent;
      playbackIntent = null;
      if (intent.type === 'preview_end') {
        if (intent.nextTagId) {
          var nt = tags.filter(function (x) { return x.id === intent.nextTagId; })[0];
          if (nt) {
            seek_to(nt.t);
            activeTagId = nt.id;
            render_tags();
            render_tag_markers();
          }
        } else {
          safe_pause();
        }
      }
    }
  });
  player.addEventListener('loadedmetadata', function () {
    durTime.textContent = fmt_time(player.duration);
    var t = get_url_time();
    if (t !== null) handle_url_time(t);
    playerMsg.textContent = '';
    render_tag_markers();
    render_playhead_line();
  });
  player.addEventListener('error', function () {
    if (!audio) return;
    playerMsg.className = 'player_msg err';
    playerMsg.innerHTML = '⚠ Could not load this source. For large Drive files, Google may block direct streaming — try Cloudflare R2, Backblaze B2, or GitHub Releases instead.';
  });
  player.addEventListener('loadstart', function () {
    playerMsg.className = 'player_msg';
    playerMsg.textContent = audio ? 'Loading audio…' : '';
  });

  // ============ tags ============
  function ensure_order() {
    var missing = tags.some(function (t) { return t.order == null; });
    if (!missing) return;
    var sorted = tags.slice().sort(function (a, b) { return a.t - b.t; });
    sorted.forEach(function (t, i) { if (t.order == null) t.order = i * 10; });
  }
  function sorted_tags() {
    var arr = tags.slice();
    if (sortMode === 'manual') {
      ensure_order();
      arr.sort(function (a, b) { return (a.order || 0) - (b.order || 0); });
    } else {
      arr.sort(function (a, b) { return a.t - b.t; });
    }
    return arr;
  }
  function set_sort_mode(mode) {
    if (mode !== 'time' && mode !== 'manual') return;
    if (mode === 'manual') ensure_order();
    sortMode = mode;
    save_sort();
    render_sort_toggle();
    render_tags();
  }
  function render_sort_toggle() {
    Array.from(sortToggle.querySelectorAll('button')).forEach(function (b) {
      if (b.dataset.mode === sortMode) b.classList.add('active');
      else b.classList.remove('active');
    });
  }

  function add_tag() {
    var t = player.currentTime || 0;
    var maxOrder = tags.reduce(function (m, x) { return Math.max(m, x.order || 0); }, 0);
    var tag = {
      id: 't_' + Date.now() + '_' + Math.random().toString(36).slice(2, 6),
      t: t, label: '', order: maxOrder + 10,
      owner: get_device_id()
    };
    tags.push(tag);
    activeTagId = tag.id;
    save_tags();
    queue_save_data_to_repo('add tag at ' + fmt_time(t));
    render_tags();
    // sync focus (no setTimeout) — keeps mobile gesture chain so keyboard pops up
    var rows = tagList.querySelectorAll('.tag_row');
    for (var i = 0; i < rows.length; i++) {
      if (rows[i].classList.contains('active')) {
        var inp = rows[i].querySelector('.tag_label');
        if (inp) { inp.focus(); inp.click(); }
        break;
      }
    }
    toast('Tagged at ' + fmt_time(t));
  }
  function nudge_tag(id, delta) {
    var tag = tags.filter(function (x) { return x.id === id; })[0];
    if (!tag) return;
    tag.t = Math.max(0, tag.t + delta);
    save_tags();
    queue_save_data_to_repo('nudge tag start');
    render_tags();
    render_tag_markers();
  }
  function next_tag_by_time(tag) {
    var sorted = tags.slice().sort(function (a, b) { return a.t - b.t; });
    var i = sorted.findIndex(function (t) { return t.id === tag.id; });
    return (i >= 0 && i < sorted.length - 1) ? sorted[i + 1] : null;
  }
  function tag_end(tag) {
    // null when no end has been set — user must explicitly add it
    return (tag.e != null) ? tag.e : null;
  }
  function add_tag_end(id) {
    var tag = tags.filter(function (x) { return x.id === id; })[0];
    if (!tag) return;
    tag.e = Math.max(tag.t + 1, player.currentTime || tag.t + 1);
    save_tags();
    queue_save_data_to_repo('set tag end');
    render_tags();
    render_tag_markers();
    preview_end(tag);
  }
  function nudge_tag_end(id, delta) {
    var tag = tags.filter(function (x) { return x.id === id; })[0];
    if (!tag || tag.e == null) return;
    tag.e = Math.max(tag.t + 1, tag.e + delta);
    save_tags();
    queue_save_data_to_repo('nudge tag end');
    render_tags();
    render_tag_markers();
    preview_end(tag);
  }
  function preview_end(tag) {
    if (tag.e == null) return;
    var endT = tag.e;
    var startT = Math.max(0, endT - 3);
    var nx = next_tag_by_time(tag);
    playbackIntent = { type: 'preview_end', endTime: endT, nextTagId: nx ? nx.id : null };
    seek_to(startT);
    safe_play();
  }
  function update_playing_tag() {
    var ct = player.currentTime;
    var found = null;
    var sorted = tags.slice().sort(function (a, b) { return a.t - b.t; });
    for (var i = 0; i < sorted.length; i++) {
      var t = sorted[i];
      var endT = t.e != null ? t.e : (sorted[i + 1] ? sorted[i + 1].t : Infinity);
      if (ct >= t.t && ct < endT) { found = t.id; break; }
    }
    if (found !== playingTagId) {
      playingTagId = found;
      render_tags();
    }
  }
  function play_from_tag(tag) {
    playbackIntent = null;
    seek_to(tag.t);
    safe_play();
    activeTagId = tag.id;
    render_tags();
    render_tag_markers();
  }
  function handle_url_time(t) {
    if (t == null) return;
    seek_to(t);
    var match = tags.filter(function (x) { return Math.abs(x.t - t) < 2; })[0];
    if (match) {
      activeTagId = match.id;
    } else {
      var maxOrder = tags.reduce(function (m, x) { return Math.max(m, x.order || 0); }, 0);
      var tag = {
        id: 't_url_' + Math.floor(t) + '_' + Math.random().toString(36).slice(2, 5),
        t: t, label: '', order: maxOrder + 10
      };
      tags.push(tag);
      activeTagId = tag.id;
      save_tags();
      toast('Created tag at ' + fmt_time(t));
    }
    render_tags();
    render_tag_markers();
    // try to autoplay; on failure paint the active tag's play button yellow
    var p = player.play();
    if (p && typeof p.catch === 'function') {
      p.catch(function () {
        autoplayBlocked = true;
        render_tags();
      });
    }
  }
  function render_tags() {
    tagList.innerHTML = '';
    if (!tags.length) {
      var d = document.createElement('div');
      d.className = 'empty';
      d.textContent = 'No tags yet — hit play and tap "+ Tag this moment".';
      tagList.appendChild(d);
      return;
    }
    sorted_tags().forEach(function (tag) {
      var isPlaying = (tag.id === playingTagId);
      var row = document.createElement('div');
      row.className = 'tag_row';
      if (tag.id === activeTagId) row.classList.add('active');
      if (isPlaying) row.classList.add('playing');
      if (sortMode !== 'manual') row.classList.add('no_drag');
      var myDev = get_device_id();
      if (tag.owner && tag.owner === myDev) row.classList.add('mine');
      row.dataset.tagId = tag.id;

      var handle = document.createElement('div');
      handle.className = 'drag_handle';
      handle.innerHTML = '≡';
      handle.title = (sortMode === 'manual') ? 'Drag to reorder' : 'Switch to Manual sort to drag';
      attach_drag(handle, row, tag);
      row.appendChild(handle);

      var amPlayingThis = isPlaying && !player.paused;
      var blockedHere   = autoplayBlocked && tag.id === activeTagId;
      var playBtnRow = document.createElement('button');
      playBtnRow.className = 'play_tag' + (blockedHere ? ' autoplay_blocked' : '');
      playBtnRow.title = amPlayingThis ? 'Pause' : 'Play from this tag';
      playBtnRow.innerHTML = amPlayingThis ? ICON_PAUSE : ICON_PLAY;
      playBtnRow.addEventListener('click', function () {
        if (amPlayingThis) { safe_pause(); }
        else { autoplayBlocked = false; play_from_tag(tag); }
      });
      row.appendChild(playBtnRow);

      var time = document.createElement('div');
      time.className = 'tag_time';
      time.textContent = fmt_time(tag.t);
      time.title = 'Jump to ' + fmt_time(tag.t);
      time.addEventListener('click', function () { play_from_tag(tag); });
      row.appendChild(time);

      var label = document.createElement('input');
      label.className = 'tag_label';
      label.type = 'text';
      label.setAttribute('inputmode', 'text');
      label.setAttribute('autocapitalize', 'sentences');
      label.value = tag.label || '';
      label.placeholder = 'untitled moment';
      label.addEventListener('input', function () {
        tag.label = label.value;
        save_tags();
        queue_save_data_to_repo('rename tag');
      });
      label.addEventListener('keydown', function (e) { if (e.key === 'Enter') label.blur(); });
      row.appendChild(label);

      if (isPlaying && SHOW_END_UI) {
        if (tag.e == null) {
          // no end yet — show "set end" button
          var addEnd = document.createElement('button');
          addEnd.className = 'add_end';
          addEnd.title = 'Set end to current playback time';
          addEnd.textContent = '+ end';
          addEnd.addEventListener('click', function () { add_tag_end(tag.id); });
          row.appendChild(addEnd);
        } else {
          var endMinus = document.createElement('button');
          endMinus.className = 'tiny';
          endMinus.title = 'Move end −1s (and preview)';
          endMinus.textContent = '−1';
          endMinus.addEventListener('click', function () { nudge_tag_end(tag.id, -1); });
          row.appendChild(endMinus);

          var endTime = document.createElement('div');
          endTime.className = 'tag_end';
          endTime.textContent = fmt_time(tag.e);
          endTime.title = 'Preview end (last 3s) then jump to next tag';
          endTime.addEventListener('click', function () { preview_end(tag); });
          row.appendChild(endTime);

          var endPlus = document.createElement('button');
          endPlus.className = 'tiny';
          endPlus.title = 'Move end +1s (and preview)';
          endPlus.textContent = '+1';
          endPlus.addEventListener('click', function () { nudge_tag_end(tag.id, 1); });
          row.appendChild(endPlus);
        }
      }

      // start-time nudges (only when playing) — placed to the right, just before link
      if (isPlaying) {
        var minus1 = document.createElement('button');
        minus1.className = 'tiny';
        minus1.title = 'Move start −1s';
        minus1.textContent = '−1';
        minus1.addEventListener('click', function () { nudge_tag(tag.id, -1); });
        row.appendChild(minus1);
        var plus1 = document.createElement('button');
        plus1.className = 'tiny';
        plus1.title = 'Move start +1s';
        plus1.textContent = '+1';
        plus1.addEventListener('click', function () { nudge_tag(tag.id, 1); });
        row.appendChild(plus1);
      }

      var linkBtn = document.createElement('button');
      linkBtn.className = 'ghost';
      linkBtn.title = 'Copy direct link';
      linkBtn.innerHTML = ICON_LINK;
      linkBtn.addEventListener('click', function () {
        var url = build_share_url(tag.t);
        copy_to_clipboard(url);
        toast('Link copied: ' + url);
      });
      row.appendChild(linkBtn);

      var delBtn = document.createElement('button');
      delBtn.className = 'ghost';
      delBtn.title = 'Delete tag';
      delBtn.innerHTML = ICON_X;
      delBtn.addEventListener('click', function () {
        if (!confirm('Delete this tag?')) return;
        tags = tags.filter(function (x) { return x.id !== tag.id; });
        add_tombstone(tag.id);
        save_tags();
        render_tags();
        render_tag_markers();
        save_data_to_repo('delete tag ' + (tag.label || tag.id))
          .then(function () { toast('Deleted (saved to repo).'); })
          .catch(function (err) { toast('Delete sync failed: ' + err.message); });
      });
      row.appendChild(delBtn);

      tagList.appendChild(row);
    });
    render_tag_markers();
  }

  // ---- drag-to-reorder (pointer events) ----
  function attach_drag(handle, row, tag) {
    handle.addEventListener('pointerdown', function (e) {
      e.preventDefault();
      if (sortMode !== 'manual') {
        set_sort_mode('manual');
        toast('Switched to Manual sort');
        return;
      }
      try { handle.setPointerCapture(e.pointerId); } catch (err) {}
      dragState = { tag: tag, row: row, pointerId: e.pointerId, moved: false };
      row.classList.add('dragging');
      window.addEventListener('pointermove', on_drag_move);
      window.addEventListener('pointerup',   on_drag_end);
      window.addEventListener('pointercancel', on_drag_end);
    });
  }
  function on_drag_move(e) {
    if (!dragState) return;
    dragState.moved = true;
    var rows = Array.from(tagList.querySelectorAll('.tag_row'));
    var y = e.clientY;
    var insertBeforeEl = null;
    for (var i = 0; i < rows.length; i++) {
      var r = rows[i];
      if (r === dragState.row) continue;
      var rect = r.getBoundingClientRect();
      if (y < rect.top + rect.height / 2) { insertBeforeEl = r; break; }
    }
    var ind = tagList.querySelector('.drop_indicator');
    if (!ind) {
      ind = document.createElement('div');
      ind.className = 'drop_indicator';
    }
    if (insertBeforeEl) tagList.insertBefore(ind, insertBeforeEl);
    else tagList.appendChild(ind);
  }
  function on_drag_end(e) {
    if (!dragState) return;
    var s = dragState;
    dragState = null;
    window.removeEventListener('pointermove', on_drag_move);
    window.removeEventListener('pointerup',   on_drag_end);
    window.removeEventListener('pointercancel', on_drag_end);
    s.row.classList.remove('dragging');
    var ind = tagList.querySelector('.drop_indicator');
    if (!s.moved || !ind) { if (ind) ind.remove(); return; }
    var newOrder = [];
    Array.from(tagList.children).forEach(function (el) {
      if (el === ind) newOrder.push(s.tag.id);
      else if (el === s.row) { /* skip */ }
      else if (el.dataset && el.dataset.tagId) newOrder.push(el.dataset.tagId);
    });
    newOrder.forEach(function (id, i) {
      var t = tags.filter(function (x) { return x.id === id; })[0];
      if (t) t.order = i * 10;
    });
    save_tags();
    ind.remove();
    render_tags();
  }

  tagBtn.addEventListener('click', add_tag);
  Array.from(sortToggle.querySelectorAll('button')).forEach(function (b) {
    b.addEventListener('click', function () { set_sort_mode(b.dataset.mode); });
  });

  document.addEventListener('keydown', function (e) {
    var typing = e.target && (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA');
    if (typing) return;
    if (e.key === ' ') { e.preventDefault(); toggle_play(); return; }
    if (e.key === 't' || e.key === 'T') { e.preventDefault(); add_tag(); return; }
    if (e.key === 'ArrowLeft')  { e.preventDefault(); nudge(e.shiftKey ? -120 : -15); }
    if (e.key === 'ArrowRight') { e.preventDefault(); nudge(e.shiftKey ?  120 :  15); }
  });

  // ============ clipboard / toast ============
  function copy_to_clipboard(s) {
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(s).catch(fallback);
    } else { fallback(); }
    function fallback() {
      var ta = document.createElement('textarea');
      ta.value = s;
      document.body.appendChild(ta);
      ta.select();
      try { document.execCommand('copy'); } catch (e) {}
      document.body.removeChild(ta);
    }
  }
  function toast(msg) {
    toastEl.textContent = msg;
    toastEl.classList.add('show');
    clearTimeout(toast._tid);
    toast._tid = setTimeout(function () { toastEl.classList.remove('show'); }, 1800);
  }

  // ============ export / import ============
  exportBtn.addEventListener('click', function () {
    var payload = { page_id: PAGE_ID, exported_at: new Date().toISOString(), tags: tags };
    var blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
    var a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = PAGE_ID + '_tags.json';
    a.click();
    setTimeout(function () { URL.revokeObjectURL(a.href); }, 1000);
  });
  importBtn.addEventListener('click', function () { importIn.click(); });
  importIn.addEventListener('change', function () {
    var f = importIn.files && importIn.files[0];
    if (!f) return;
    var rd = new FileReader();
    rd.onload = function () {
      try {
        var raw = JSON.parse(rd.result);
        var newTags = Array.isArray(raw) ? raw : (raw.tags || []);
        var byTagId = {};
        tags.forEach(function (x) { byTagId[x.id] = x; });
        newTags.forEach(function (x) { if (x && x.id && typeof x.t === 'number') byTagId[x.id] = x; });
        tags = Object.values(byTagId);
        save_tags();
        render_tags();
        toast('Imported ' + newTags.length + ' tag(s)');
      } catch (e) { toast('Import failed: ' + e.message); }
      importIn.value = '';
    };
    rd.readAsText(f);
  });
  clearBtn.addEventListener('click', function () {
    if (!tags.length) { toast('No tags to clear'); return; }
    if (!confirm('Clear all ' + tags.length + ' tags on this device?')) return;
    tags = [];
    save_tags();
    render_tags();
  });

  // ============ boot ============
  playBtn.innerHTML = ICON_PLAY;
  render_sort_toggle();
  render_tags();
  render_pat_status();
  render_audio_label();
  fetch_repo_data();
</script>

</body>
</html>
